<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body {
      margin: 0;
      padding: 60px 40px;
      background: #ffffff;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }
    .preview-wrapper {
      max-width: 680px;
      margin: 0 auto;
    }
    .preview-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;

      margin-bottom: 32px;
    }
    .preview-label span { color: #ff2200; }
    .preview-context {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(240,235,224,0.06);
    }
    .preview-context p {
      font-family: 'Space Mono', monospace;
      font-size: 9px;

<body>

<div class="preview-wrapper">
  <p class="preview-label"><span>//</span> Email Signature Preview</p>

<!-- ═══════════════════════════════════════════════════════════════

<table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">

  <!-- ── Name ──────────────────────────────────────────────────── -->
  <tr>
    <td style="padding: 0 0 2px 0;">

  </tr>

        <a href="mailto:eli@deadendcreative.co" style="color: #ff2200; text-decoration: none;">eli@deadendcreative.co</a>

  <tr>

        <span style="color: #111111;">DEAD</span><span style="color: #ff2200;">END</span>
